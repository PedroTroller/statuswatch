name: Fetch & publish status cache

on:
  schedule:
    # Every 5 minutes (GitHub Actions minimum interval).
    - cron: '*/5 * * * *'
  # Allow triggering manually from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; cancel any in-progress run if a new
# one is triggered so the cache never lags more than one cycle behind.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Icons rarely change — cache them keyed on catalog.js so they're only
      # re-fetched when the service list changes, not on every 5-minute cron run.
      - name: Cache service icons
        uses: actions/cache@v4
        with:
          path: proxy/dist/icons
          key: service-icons-v1-${{ hashFiles('proxy/catalog.js') }}
          restore-keys: service-icons-v1-

      - name: Fetch all status pages
        run: node proxy/fetch-all.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: proxy/dist/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
