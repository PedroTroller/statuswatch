name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run unit tests
        run: node test/unit.js

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run integration tests
        run: node test/integration.js
