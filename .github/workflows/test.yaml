name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run unit tests
        run: node test/unit.js

  validate:
    name: Validate catalog
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate catalog entries
        run: node proxy/validate-catalog.js

      - name: Post catalog summary
        if: github.event_name == 'pull_request'
        run: |
          node -e "
            'use strict';
            const fs   = require('fs');
            const path = require('path');
            const catalogSrc = fs.readFileSync('proxy/catalog.js', 'utf8');
            const CATALOG    = new Function(\`\${catalogSrc}; return CATALOG;\`)();
            const lines = CATALOG.map(e => \`- \${e.id}\`).join('\n');
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '## Catalog service IDs\n\n' + lines + '\n');
          "

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [unit, validate]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run integration tests
        run: node test/integration.js
