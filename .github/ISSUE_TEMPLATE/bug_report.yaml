name: Bug report
description: Something is broken or behaving unexpectedly.
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the popup
        2. Click …
        3. See …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Extension version
      description: Visible at chrome://extensions next to "Status Pages".
      placeholder: "0.1.0"

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Chromium
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, error messages from the service worker console, etc.
